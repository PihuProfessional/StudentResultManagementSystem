<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduResult - Setup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card setup-card">
            <h2>Step 1: Exam Configuration</h2>
            <p>Define the school and subject criteria below.</p>
            
            <div class="input-group">
                <label>School Name</label>
                <input type="text" id="schoolName" placeholder="Enter Full School Name">
            </div>

            <div class="input-group">
                <label>Maximum Marks (Per Subject)</label>
                <input type="number" id="maxMarks" value="100">
            </div>

            <div class="input-group">
                <label>Number of Subjects</label>
                <input type="number" id="subCount" min="1" max="10" placeholder="e.g. 5" oninput="generateSubjectFields()">
            </div>

            <div id="subjectNameContainer"></div>

            <button class="next-btn" onclick="saveConfig()">Next: Enter Student Marks</button>
        </div>
    </div>

    <script src="setup.js"></script>
</body>
</html>
